name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Run linter
        working-directory: frontend
        run: bun run lint

      - name: Run format check
        working-directory: frontend
        run: bun run format

      - name: Run knip
        working-directory: frontend
        run: bun run knip

      - name: Run typecheck
        working-directory: frontend
        run: bun run typecheck

      - name: Run tests
        working-directory: frontend
        run: bun test

      - name: Build Next.js app
        working-directory: frontend
        run: bun run build
